<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <title>
    {% block title %}
    {% endblock %}
  </title>
  <meta name="keywords" content="HTML, CSS, JavaScript" />
  <meta name="author" content="John Doe" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--Google Fonts-->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
    rel="stylesheet" />
  <!--Bootstrap for Css-->
  <link rel="stylesheet" href="{{url_for('static',filename='css/style.css')}}">
  <link rel="stylesheet" href="{{url_for('static',filename='css/all.min.css')}}">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <!-- <link rel="stylesheet" href="../static/css/style.css" />
  <link rel="stylesheet" href="../static/css/all.min.css" /> -->
</head>

<body>
  <!--Navbar-->
  <div class="navbar navbar-expand-lg sticky-top" data-bs-theme="dark">
    <div class="container-fluid">
      <a class="navbar-brand">UniSmart</a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu" aria-expanded="false"
        aria-controls="menu" aria-label="Toggle Menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a href="{{url_for('dashboard_page')}}" class="nav-link {{'active' if active=='dashboard' else ''}}" role="button">Dashboard</a>
          </li>
          <li class="nav-item">
            <a href="{{url_for('students_page')}}" class="nav-link {{'active' if active=='students' else ''}}" role="button">Etudiants</a>
          </li>
          <li class="nav-item">
            <a href="{{url_for('timetable_page')}}" class="nav-link {{'active' if active=='timetable' else ''}}" role="button">Emploi du temps</a>
          </li>
          <li class="nav-item">
            <a href="#" class="nav-link" role="button">Stats</a>
          </li>
        </ul>
      </div>
    </div>
  </div>


  <!-- ── CONTENT — each page fills this ── -->
  {% block content %}
  {% endblock %}
  <!--Bootstrap for Js-->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  {% block scripts %}
  {% endblock %}
</body>

</html>
