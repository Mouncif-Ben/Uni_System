{% extends "base.html" %}
{%block title%}Base page{%endblock%}

{% block content %}
  <table class="table table-hover">
    <thead>
      <th>ID</th>
      <th>Name</th>
      <th>Country</th>
      <th>Age</th>
      <th>Options</th>
    </thead>
    <tbody>
      {% for item in items %}
      <tr>
        <td>{{item.id}}</td>
        <td>{{item.Name}}</td>
        <td>{{item.Country}}</td>
        <td>{{item.age}}</td>
        <td>
          <button class="btn btn-outline-success">Voir</button>
          <button class="btn btn-outline-info">Voir</button>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
